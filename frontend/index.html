<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Filial Hisobot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- 1-EKRAN: Filial tanlash -->
  <section id="screen-filial" class="screen active">
    <div class="header">
      <h1>Filialni tanlang</h1>
      <p class="subtitle">Hisobot qaysi filial uchun</p>
    </div>
    <div id="filial-list" class="filial-list">Novza</div>
  </section>

  <!-- 2-EKRAN: Bo'limlar bo'yicha rasm olish -->
  <section id="screen-sections" class="screen">
    <div class="header">
      <h1 id="filial-name-title">Filial</h1>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="progress-text" class="hint">0 / 0 bo'lim</span>
      </div>
    </div>
    <div id="section-list" class="section-list"></div>
  </section>

  <!-- 3-EKRAN: Muvaffaqiyat -->
  <section id="screen-success" class="screen">
    <div class="success-box">
      <span class="success-icon">✅</span>
      <h1>Yuborildi!</h1>
      <p class="subtitle">Barcha rasmlar tegishli filial bo'limiga yetkazildi. Rahmat!</p>
      <button id="btn-close" class="primary-btn">Yopish</button>
    </div>
  </section>

  <!-- Yashirin: bitta bo'lim uchun rasm capture inputi (JS orqali dinamik ochiladi) -->
  <input type="file" id="camera-input" accept="image/*" capture="environment" multiple style="display:none" />

</div>

<div id="overlay-loading" class="overlay hidden">
  <div class="spinner"></div>
  <p id="loading-text">Yuborilmoqda...</p>
</div>

<script src="app.js"></script>
</body>
</html>
